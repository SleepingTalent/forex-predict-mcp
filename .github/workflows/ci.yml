name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # test — runs on every branch and PR
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/

      - name: Unit tests
        run: uv run pytest tests/ -v

      - name: Build Docker image
        run: docker build -t forex-predict-mcp:ci .

  # ---------------------------------------------------------------------------
  # publish — runs only on main branch push or version tags
  # ---------------------------------------------------------------------------
  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/forex-predict-mcp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/forex-predict-mcp:${{ steps.version.outputs.value }}

      - name: Bump patch version
        id: bump
        run: |
          NEW_VERSION=$(python3 -c "
          v = '${{ steps.version.outputs.value }}'.split('.')
          v[2] = str(int(v[2]) + 1)
          print('.'.join(v))
          ")
          sed -i "s/^version = \"${{ steps.version.outputs.value }}\"/version = \"$NEW_VERSION\"/" pyproject.toml
          uv lock
          echo "value=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.value }} [skip ci]"
          git push origin main
